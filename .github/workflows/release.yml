name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to release (example: v0.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark this as a pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag exists
        run: git rev-parse "${{ github.event.inputs.tag }}" >/dev/null

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
